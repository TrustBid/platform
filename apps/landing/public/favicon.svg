<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <style>
    .dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark  { display: inline; }
    }
  </style>
  <image class="light" width="160" height="160" href="data:image/png;base64,"/>
  <image class="dark"  width="160" height="160" href="data:image/png;base64,"/>
</svg>
